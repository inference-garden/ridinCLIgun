# ridinCLIgun — English UI strings (baseline)
# All user-facing text. Keys referenced via t("section.key").

# ── Toast messages ───────────────────────────────────────────────

[toast]
ai_on = "AI review: on"
ai_off = "AI review: off"
ai_on_no_key = "AI review: on — no API key"
secret_on = "Secret mode: on"
secret_off = "Secret mode: off"
shell_restarted = "Shell restarted."
