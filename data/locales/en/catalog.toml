# ridinCLIgun — English catalog strings (baseline)
# Extracted from command_catalog.json. Keys: family_id.pattern_index

[rm.0]
summary = "Recursive forced deletion — removes files permanently without confirmation."
suggestion = "Use 'rm -ri' for interactive confirmation, or 'trash' to move to Trash."

[rm.1]
summary = "Recursive deletion — removes directory trees."
suggestion = "Double-check the target path. Consider 'rm -ri' for confirmation."

[rm.2]
summary = "Deleting root, home, or everything in current directory."
suggestion = "This is almost certainly not what you want. Be very specific about the target."

[chmod.0]
summary = "Recursively setting world-readable/writable/executable permissions."
suggestion = "Use specific permissions (e.g., 755 for dirs, 644 for files). Avoid 777."

[chmod.1]
summary = "Setting world-readable/writable/executable permissions."
suggestion = "755 (dirs) or 644 (files) is usually what you need. 777 is a security risk."

[curl_pipe.0]
summary = "Downloading and executing code directly — you can't inspect it first."
suggestion = "Download the script first, review it, then execute: curl -o script.sh URL && less script.sh && bash script.sh"

[dd.0]
summary = "Writing directly to a device — can overwrite your disk."
suggestion = "Triple-check the target device. 'of=/dev/sda' will destroy your system disk."

[sudo.0]
summary = "Recursive forced deletion with root privileges — maximum damage potential."
suggestion = "Be extremely careful. Consider running without sudo first to see what would be deleted."

[sudo.1]
summary = "Changing ownership or permissions with root privileges."
suggestion = "Ensure you're targeting the correct path. Recursive changes can break your system."

[git_destructive.0]
summary = "Force push overwrites remote history — other collaborators will lose work."
suggestion = "Use 'git push --force-with-lease' instead — it fails if someone else pushed."

[git_destructive.1]
summary = "Hard reset discards all uncommitted changes permanently."
suggestion = "Consider 'git stash' first to save your changes, or use 'git reset --soft'."

[git_destructive.2]
summary = "Removes untracked files permanently."
suggestion = "Run 'git clean -n' first (dry run) to see what would be deleted."

[network.0]
summary = "Starts an HTTP server that exposes the current directory to the network."
suggestion = "Bind to localhost only: python -m http.server --bind 127.0.0.1"

[network.1]
summary = "Exposes a local service to the public internet."
suggestion = "Make sure you know what service you're exposing and who can access it."

[env_secrets.0]
summary = "Printing sensitive environment variables — may appear in logs or history."
suggestion = "Avoid echoing secrets. Use 'printenv VAR | wc -c' to check if set without exposing."

[env_secrets.1]
summary = "Setting secrets as environment variables — will appear in shell history."
suggestion = "Use a .env file or secrets manager instead. Prefix with a space to avoid history (if HISTCONTROL=ignorespace)."

[mkfs.0]
summary = "Creating a filesystem destroys all data on the target partition."
suggestion = "Verify the target device with 'lsblk' before running. This is irreversible."

[fork_bomb.0]
summary = "Fork bomb — spawns processes until the system is unresponsive."
suggestion = "This will crash your system. If run accidentally, use 'killall' from another terminal."

[disk_overwrite.0]
summary = "Securely overwrites files — data is unrecoverable after shred."
suggestion = "Verify the target. Unlike 'rm', shred data cannot be recovered."

[disk_overwrite.1]
summary = "Wipes filesystem signatures from a device."
suggestion = "Verify the device with 'lsblk'. This makes partitions unrecognizable."

[ssh_and_keys.0]
summary = "Operating on SSH keys — may expose or overwrite key material."
suggestion = "Back up your keys before modifying. Never share private keys."

[ssh_and_keys.1]
summary = "Transferring files over SSH — verify destination and direction."
suggestion = "Double-check source and destination to avoid overwriting remote files."

[iptables_firewall.0]
summary = "Modifying firewall rules — may lock you out or expose services."
suggestion = "Test rules with a timeout: 'iptables -A ... && sleep 60 && iptables -D ...'"

[package_managers.0]
summary = "Installing Python packages system-wide can break OS dependencies."
suggestion = "Use a virtual environment: 'python -m venv .venv && source .venv/bin/activate'"

[package_managers.1]
summary = "Upgrading all Homebrew packages at once — may introduce breaking changes."
suggestion = "Upgrade specific packages: 'brew upgrade <package>'"

[system_files.0]
summary = "Writing to system configuration files — may break your system."
suggestion = "Always back up before modifying: 'sudo cp /etc/file /etc/file.bak'"

[system_files.1]
summary = "Modifying authentication or sudo configuration."
suggestion = "Use 'visudo' (not a direct editor) to avoid locking yourself out."

[docker.0]
summary = "Removes all unused Docker resources — may delete data volumes."
suggestion = "Run without '-a' first, or 'docker system df' to see what would be removed."

[docker.1]
summary = "Running container in privileged mode — full host access."
suggestion = "Avoid --privileged unless strictly necessary. Use --cap-add for specific capabilities."

[history_sensitive.0]
summary = "Reading shell history — may contain passwords and sensitive commands."
suggestion = "Grep for specific entries instead of dumping the entire history."

[history_sensitive.1]
summary = "Reading sensitive credential or key files."
suggestion = "Be careful with output — don't pipe to logs or paste into chats."
